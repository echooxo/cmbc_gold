<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招行黄金详情页</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #d4af37, #f3e5ab);
            padding: 24px 20px;
            color: #fff;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: normal;
            opacity: 0.9;
        }
        .current-price {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0 5px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .update-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
        }
        .price-actions {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 14px;
        }
        .price-actions div span {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-top: 4px;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .diff-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }
        .diff-item {
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        .diff-item .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .diff-item .value {
            font-size: 16px;
            font-weight: bold;
        }
        .value.up {
            color: #e53935;
        }
        .value.down {
            color: #43a047;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
        }
        .tabs {
            display: flex;
            gap: 8px;
        }
        .tab {
            padding: 4px 12px;
            font-size: 12px;
            background: #f0f0f0;
            border-radius: 12px;
            color: #666;
            cursor: pointer;
        }
        .tab.active {
            background: #d4af37;
            color: #fff;
        }

    </style>
</head>
<body>

    <!-- 头部：实时价格 -->
    <div class="header">
        <h1>招商银行 黄金(克)</h1>
        <div class="current-price" id="currentPrice">--</div>
        <div class="update-time" id="updateTime">--</div>
        <div class="price-actions">
            <div>买入价 (元/克) <span id="buyPrice">--</span></div>
            <div>卖出价 (元/克) <span id="sellPrice">--</span></div>
        </div>
    </div>

    <div class="container">
        <!-- 涨跌幅卡片 -->
        <div class="card">
            <div class="chart-title" style="margin-bottom: 12px;">历史涨跌幅</div>
            <div class="diff-grid">
                <div class="diff-item">
                    <div class="label">日涨跌</div>
                    <div class="value" id="diff_0">--</div>
                </div>
                <div class="diff-item">
                    <div class="label">近1个月</div>
                    <div class="value" id="diff_1">--</div>
                </div>
                <div class="diff-item">
                    <div class="label">近3个月</div>
                    <div class="value" id="diff_3">--</div>
                </div>
                <div class="diff-item">
                    <div class="label">近6个月</div>
                    <div class="value" id="diff_6">--</div>
                </div>
                <div class="diff-item">
                    <div class="label">近1年</div>
                    <div class="value" id="diff_12">--</div>
                </div>
            </div>
        </div>

        <!-- K线图/折线图卡片 -->
        <div class="card">
            <div class="chart-header">
                <div class="chart-title">价格走势</div>
                <div class="tabs">
                    <div class="tab">分时</div>
                    <div class="tab">1月</div>
                    <div class="tab">3月</div>
                    <div class="tab">6月</div>
                    <div class="tab active">1年</div>
                </div>
            </div>
            <canvas id="priceChart" height="200"></canvas>
        </div>
        
        <div style="height: 80px;"></div> <!-- 底部留白 -->
    </div>



    <script>
        let chartInstance = null;
        
        async function fetchRealTimePrice() {
            try {
                const response = await fetch('http://127.0.0.1:8080/api/price-diff', {
                    method: 'GET'
                });
                const result = await response.json();
                if (result.sysCode === 1014 && result.bizResult && result.bizResult.data) {
                    const data = result.bizResult.data;
                    document.getElementById('currentPrice').innerText = data.sellPrice || '--';
                    document.getElementById('buyPrice').innerText = data.buyPrice || '--';
                    document.getElementById('sellPrice').innerText = data.sellPrice || '--';
                    
                    const now = new Date();
                    const timeString = now.getHours().toString().padStart(2, '0') + ':' + 
                                     now.getMinutes().toString().padStart(2, '0') + ':' + 
                                     now.getSeconds().toString().padStart(2, '0');
                    document.getElementById('updateTime').innerText = '更新时间 ' + timeString;
                    
                    if (data.diffMap) {
                        const periods = ['0', '1', '3', '6', '12'];
                        periods.forEach(p => {
                            const el = document.getElementById('diff_' + p);
                            if (el && data.diffMap[p]) {
                                const val = data.diffMap[p];
                                el.innerText = val;
                                el.className = 'value ' + (val.startsWith('-') ? 'down' : 'up');
                            }
                        });
                    }
                }
            } catch (error) {
                console.error('Fetch real-time price error:', error);
            }
        }

        async function fetchTimePriceData() {
            try {
                const response = await fetch('http://127.0.0.1:8080/api/time-price', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const result = await response.json();
                if (result.sysCode === 1014 && result.bizResult && result.bizResult.data) {
                    return {
                        priceList: result.bizResult.data.priceList.map(item => ({
                            time: item.time.substring(0, 2) + ':' + item.time.substring(2, 4),
                            price: parseFloat(item.price)
                        })),
                        lastDayPrice: parseFloat(result.bizResult.data.lastDayPrice)
                    };
                }
            } catch (error) {
                console.error('Fetch time price error:', error);
            }
            return [];
        }

        async function fetchHistoryData(months) {
            try {
                const response = await fetch('http://127.0.0.1:8080/api/history-price', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ month: months })
                });
                const result = await response.json();
                if (result.sysCode === 1014 && result.bizResult && result.bizResult.data) {
                    return result.bizResult.data.priceList.map(item => ({
                        time: item.time.substring(4, 6) + '-' + item.time.substring(6, 8),
                        price: parseFloat(item.price)
                    }));
                }
            } catch (error) {
                console.error('Fetch error:', error);
            }
            return [];
        }

        function renderChart(data, lastDayPrice = null) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            let annotationOptions = {};
            if (lastDayPrice !== null) {
                annotationOptions = {
                    annotations: {
                        line1: {
                            type: 'line',
                            yMin: lastDayPrice,
                            yMax: lastDayPrice,
                            borderColor: '#e53935',
                            borderWidth: 1,
                            borderDash: [5, 5],
                            label: {
                                content: '昨收 ' + lastDayPrice,
                                display: true,
                                position: 'start',
                                backgroundColor: 'rgba(229, 57, 53, 0.7)',
                                font: { size: 10 }
                            }
                        }
                    }
                };
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.time),
                    datasets: [{
                        label: '黄金价格',
                        data: data.map(d => d.price),
                        borderColor: '#d4af37',
                        backgroundColor: 'rgba(212, 175, 55, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { 
                        legend: { display: false },
                        annotation: annotationOptions
                    },
                    scales: {
                        y: { grid: { color: '#f0f0f0' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888', maxTicksLimit: 6 } }
                    }
                }
            });
        }

        async function loadData(months, event) {
            if (event) {
                document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
                event.target.classList.add('active');
            }
            let data, lastDayPrice = null;
            if (months === 0) {
                const result = await fetchTimePriceData();
                if (result) {
                    data = result.priceList;
                    lastDayPrice = result.lastDayPrice;
                }
            } else {
                data = await fetchHistoryData(months);
            }
            if (data && data.length > 0) {
                renderChart(data, lastDayPrice);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchRealTimePrice();
            setInterval(fetchRealTimePrice, 5000);
            loadData(12);
            const tabs = document.querySelectorAll('.tab');
            tabs[0].onclick = (e) => loadData(0, e);
            tabs[1].onclick = (e) => loadData(1, e);
            tabs[2].onclick = (e) => loadData(3, e);
            tabs[3].onclick = (e) => loadData(6, e);
            tabs[4].onclick = (e) => loadData(12, e);
        });
    </script>
</body>
</html>
